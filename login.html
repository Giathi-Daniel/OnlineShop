
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWESOME PIZZA : Signup</title>

    <!-- font awesome cdn link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <!-- Boxicons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/signup.css">
</head>
<body class="auth-page">

    <nav class="navbar"></nav>
    
    <main class="auth-main">
        <div class="container" id="container">
            <!-- sign in -->
            <div class="form-container sign-in">
                <form>
                    <h2>Sign In</h2>
                    <div class="social-icons">
                        <a class="icon googleLogin">
                            <i class='bx bxl-google-plus'></i>
                        </a>
                        <a class="icon facebookLogin">
                            <i class='bx bxl-facebook'></i>
                        </a>
                        <a class="icon twitterLogin">
                            <i class='bx bxl-twitter'></i>
                        </a>
                    </div>
                    <span>or use email password</span>
                    <input type="email" placeholder="Enter email" id="email" required>
                    <input type="password" placeholder="password" id="password" required>
                    <a href="#">Forget password?</a>
                    <button class="submit-btn" id="login">Sign in</button>
                </form>
            </div>
            <div class="toggle-container">
                <div class="toggle">
                    <div class="toggle-panel toggle-right">
                        <h1>Hello friend!</h1>
                        <p>Register with us to fully access our site</p>
                        <a href="./sign.html" style="inline-size: 100%; font-size: 1rem;">
                            <button class="hidden" id="register">Sign Up</button>
                        </a>
                    </div>
                </div>
            </div>
        </div>    
    </main>

    <section class="footer"></section>

    <script src="./JS/nav.js"></script>
    <script src="./JS/footer.js"></script>
    <script src="./JS/facebook.js" type="module"></script>
    <script src="./JS/twitter.js" type="module"></script>
    <script src="./JS/google.js" type="module"></script>
    <script src="./JS/signup.js" type="module"></script>
</body>
</html>
